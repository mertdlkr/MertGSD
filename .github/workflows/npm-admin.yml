name: npm admin (one-shot)

on:
  workflow_dispatch:

jobs:
  add-nexvar-owner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Diagnostics + transfer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc

          echo "=== whoami ==="
          npm whoami

          echo ""
          echo "=== current package owners ==="
          npm owner ls nexgsd

          echo ""
          echo "=== org probe (nexvar) ==="
          npm org ls nexvar 2>&1 || echo "(no access or no such org)"

          echo ""
          echo "=== attempt: npm owner add nexvar nexgsd ==="
          if npm owner add nexvar nexgsd 2>&1; then
            echo "SUCCESS"
          else
            echo "FAILED — trying access grant fallback..."
            echo ""
            echo "=== attempt: npm access grant read-write nexvar:developers nexgsd ==="
            npm access grant read-write nexvar:developers nexgsd 2>&1 || echo "(team 'developers' may not exist)"
          fi

          echo ""
          echo "=== final owners ==="
          npm owner ls nexgsd

          echo ""
          echo "=== access status ==="
          npm access ls-collaborators nexgsd 2>&1 || true
